name: Build NRO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build
      run: |
        make -j$(nproc)

    - name: Upload NRO
      uses: actions/upload-artifact@v4
      with:
        name: switch-installer
        path: switch-installer.nro
        retention-days: 30
