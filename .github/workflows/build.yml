name: Build NRO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITA64: /opt/devkitpro/devkitA64
      PATH: /opt/devkitpro/devkitA64/bin:/opt/devkitpro/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install libnx
      run: |
        dkp-pacman -Sy --noconfirm switch-dev libnx

    - name: Debug env
      run: |
        echo "DEVKITPRO=$DEVKITPRO"
        echo "DEVKITA64=$DEVKITA64"
        ls -la $DEVKITPRO/libnx/switch_rules 2>&1 || echo "switch_rules NOT FOUND"
        ls $DEVKITPRO/libnx/ 2>&1 || echo "libnx dir NOT FOUND"
        cat Makefile
        make -n 2>&1 || echo "make -n failed"

    - name: Build
      run: |
        make -j$(nproc)

    - name: Upload NRO
      uses: actions/upload-artifact@v4
      with:
        name: switch-installer
        path: switch-installer.nro
        retention-days: 30
