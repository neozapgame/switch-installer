name: Build NRO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITA64: /opt/devkitpro/devkitA64
      PATH: /opt/devkitpro/devkitA64/bin:/opt/devkitpro/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install libnx from source
      run: |
        apt-get update -qq && apt-get install -y -qq git make > /dev/null 2>&1 || true
        git clone --depth 1 https://github.com/switchbrew/libnx.git /tmp/libnx
        cd /tmp/libnx
        make -j$(nproc) install

    - name: Build
      run: |
        make -j$(nproc)

    - name: Upload NRO
      uses: actions/upload-artifact@v4
      with:
        name: switch-installer
        path: switch-installer.nro
        retention-days: 30
